# Nginx configuration for Digimess
# Save this to /etc/nginx/sites-available/digimess and symlink to sites-enabled

# 1. API - api.rahultambare.click
server {
    listen 80;
    server_name api.rahultambare.click;

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

# 2. Admin Panel - admin.rahultambare.click
server {
    listen 80;
    server_name admin.rahultambare.click;
    root /home/ubuntu/digimess/admin/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# 3. User Frontend - rahultambare.click
server {
    listen 80;
    server_name rahultambare.click www.rahultambare.click;
    root /home/ubuntu/digimess/frontend/web-build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
