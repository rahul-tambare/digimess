<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .otp-input:focus {
            border-bottom: 2px solid #f26d21;
            box-shadow: 0 4px 12px -2px rgba(242, 109, 33, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="w-full top-0 px-4 py-2 no-border bg-[#f4f3f2] dark:bg-zinc-900 sticky z-50">
<div class="flex items-center justify-between w-full max-w-md mx-auto">
<div class="flex items-center gap-4">
<button class="text-zinc-500 hover:bg-black/5 p-2 rounded-full transition-colors active:scale-95">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-[#F26D21]">Digi Mess</h1>
</div>
</div>
</header>
<main class="flex-1 w-full max-w-md px-8 pt-12 flex flex-col">
<!-- Editorial Header Section -->
<div class="mb-12">
<h2 class="font-headline font-extrabold text-4xl text-on-surface tracking-tight mb-4">
                Verify Identity
            </h2>
<p class="font-body text-on-surface-variant text-lg leading-relaxed">
                Enter the 4-digit code sent to your mobile
            </p>
</div>
<!-- Illustration / Visual Anchor -->
<div class="mb-12 relative h-48 w-full flex items-center justify-center overflow-hidden rounded-xl bg-surface-container-low">
<div class="absolute inset-0 opacity-10">
<img alt="Retro communication device" class="w-full h-full object-cover" data-alt="Abstract minimalist pattern with warm orange hues" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBD8zm50Nm-ngUrXVWiZ76EIDQ2jJV3uiPR3lWxldoINPfnOdPLi9t_O8ewUl6QE8EJSvOvn5hodR7zcaGs-rdWE6k-MqknHf14eRg-1LLhi4gMMQsCKz2FSFuscEEGLVlQOxLkfUPNy1ePgB2NgBQJpMW17zwbXHJrBT2rIbhE_IShaPCv9wqiyo3zvA0HokR4TAi-kUsD5wPDkDlxzx6jfrI77XkPSli-TZbDDiOqum4TaDHu4jvjwE5XdTgFpNTPJnqhd8RzUfQ"/>
</div>
<div class="z-10 bg-surface-container-lowest p-6 rounded-full shadow-sm">
<span class="material-symbols-outlined text-primary-container !text-5xl" style="font-variation-settings: 'FILL' 1;">
                    vibration
                </span>
</div>
</div>
<!-- OTP Input Area -->
<div class="flex justify-between gap-4 mb-10" id="otp-container">
<input class="otp-input w-16 h-20 text-center text-3xl font-headline font-bold bg-surface-container-lowest rounded-xl border-none ring-0 focus:ring-0 transition-all text-on-surface" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-16 h-20 text-center text-3xl font-headline font-bold bg-surface-container-lowest rounded-xl border-none ring-0 focus:ring-0 transition-all text-on-surface" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-16 h-20 text-center text-3xl font-headline font-bold bg-surface-container-lowest rounded-xl border-none ring-0 focus:ring-0 transition-all text-on-surface" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-16 h-20 text-center text-3xl font-headline font-bold bg-surface-container-lowest rounded-xl border-none ring-0 focus:ring-0 transition-all text-on-surface" maxlength="1" placeholder="•" type="text"/>
</div>
<!-- Action Section -->
<div class="space-y-6 mb-12">
<button class="w-full py-4 px-6 bg-gradient-to-r from-primary-container to-[#d95d1a] text-on-primary font-headline font-bold text-lg rounded-full shadow-[0_8px_30px_rgb(242,109,33,0.2)] active:scale-[0.98] transition-all">
                Verify and Login
            </button>
<div class="text-center">
<p class="font-body text-on-surface-variant mb-1">Didn't receive the code?</p>
<div class="flex items-center justify-center gap-2">
<span class="font-label font-medium text-zinc-400">00:59</span>
<button class="font-headline font-bold text-primary-container opacity-50 cursor-not-allowed transition-all">
                        Resend code
                    </button>
</div>
</div>
</div>
<!-- Tonal Layering Section (Brand Context) -->
<div class="mt-auto p-6 bg-surface-container-low rounded-t-[2.5rem] -mx-8">
<div class="flex items-start gap-4 p-4 bg-surface-container-lowest rounded-2xl">
<div class="w-12 h-12 rounded-xl bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-container">shield</span>
</div>
<div>
<h4 class="font-headline font-bold text-on-surface text-sm">Secure Login</h4>
<p class="font-body text-xs text-on-surface-variant leading-tight">Your data is protected by high-end encryption standards.</p>
</div>
</div>
</div>
</main>
<!-- BottomNavBar (Hidden for transactional screen per instructions) -->
</body></html>
