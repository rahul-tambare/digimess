name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_DNS }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/digimess
            git pull origin main
            
            # 1. Update Backend
            cd backend
            npm install
            cd ..
            
            # 2. Rebuild Admin
            cd admin
            npm install
            npm run build
            cd ..
            
            # 3. Rebuild User Web App
            cd frontend
            npm install
            npx expo install react-dom react-native-web
            npx expo export --platform web
            cd ..
            
            # 4. Restart Services
            pm2 restart 0
            sudo systemctl restart nginx
            
            echo "Deployment Complete! 🚀"
