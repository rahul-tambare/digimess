name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via Docker
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_DNS }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/digimess
            git pull origin main
            
            # Rebuild and start updated containers
            sudo docker compose up -d --build
            
            # Clean up old unused docker images to prevent filling the EC2 disk
            sudo docker image prune -f
            
            # Run database initialization/migrations inside the backend container
            # (Note: -T avoids "the input device is not a TTY" error in GitHub Actions)
            sudo docker compose exec -T backend npm run db:init || echo "Database initialized or encountered non-fatal error"
            
            echo "Deployment Complete via Docker Compose! 🚀"
